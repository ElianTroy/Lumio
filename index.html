    /* Loader shown until React mounts */
    #initial-loader {
      position: fixed; inset: 0;

      font-family: system-ui, sans-serif;

    @keyframes pulse { 0%,100% { opacity: 0.8; } 50% { opacity: 0.4; } }
    /* Hide loader once React mounts */
    #root:not(:empty) ~ #initial-loader { display: none; }

function setupApp() {
  if (window.__lumio_started) return;
  window.__lumio_started = true;
  const { useState, useEffect, useMemo, useCallback, useContext, createContext, useRef } = React;
  const { Flame, Trophy, Star, ChevronRight, X, Check, ArrowLeft, Sparkles, Scroll, FlaskConical, Globe2, BookOpen, Film, Dumbbell, Mountain, Landmark, Music, Lightbulb, Lock, RotateCcw, Award, Zap, Heart, Moon, Sun, Volume2, VolumeX, BarChart3, Target, Calendar, TrendingUp, Shuffle, Download, Upload, Medal } = window.LucideReact;

  // Storage polyfill: localStorage with the same async API as artifact's window.storage
  window.storage = window.storage || {
    async get(key) {
      try {
        const v = localStorage.getItem(key);
        return v != null ? { value: v } : null;
      } catch (_) { return null; }
    },
    async set(key, value) {
      try {
        localStorage.setItem(key, value);
        return { key, value };
      } catch (_) { return null; }
    },
  };

/* =========================================================================

const FontInjector = () => {
  useEffect(() => {
    if (document.getElementById('lumio-fonts')) return;
    const link = document.createElement('link');
    link.id = 'lumio-fonts';
    link.rel = 'stylesheet';
    link.href =
      'https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700&display=swap';

    const style = document.createElement('style');
    style.id = 'lumio-style';
    style.innerHTML = `
      .font-display { font-family: 'Bricolage Grotesque', system-ui, sans-serif; letter-spacing: -0.02em; }
      .font-body { font-family: 'Manrope', system-ui, sans-serif; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      /* shadows reference --shadow-color so dark mode can flip them */
      :root { --shadow-color: #1F1A38; }
      .lumio-shadow { box-shadow: 5px 5px 0 0 var(--shadow-color); }
      .lumio-shadow-sm { box-shadow: 3px 3px 0 0 var(--shadow-color); }
      .lumio-shadow-lg { box-shadow: 8px 8px 0 0 var(--shadow-color); }
      .lumio-press { transition: all 0.08s ease; }
      .lumio-press:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 0 var(--shadow-color); }
      .lumio-press-lg:active { transform: translate(5px, 5px); box-shadow: 3px 3px 0 0 var(--shadow-color); }

      /* ----------- DARK MODE ----------- */
      .lumio-dark { --shadow-color: #4A3F6B; color-scheme: dark; }
      .lumio-dark .bg-\\[\\#FFF6E9\\] { background-color: #14101F; }
      .lumio-dark .bg-white { background-color: #2A2240; }
      .lumio-dark .text-\\[\\#1F1A38\\] { color: #FFF6E9; }
      .lumio-dark .border-\\[\\#1F1A38\\] { border-color: #FFF6E9; }
      .lumio-dark .bg-\\[\\#1F1A38\\] { background-color: #06030D; }
      .lumio-dark .bg-\\[\\#1F1A38\\] .text-\\[\\#1F1A38\\] { color: #FFF6E9; }
      /* feedback colors slightly muted in dark mode */
      .lumio-dark .bg-\\[\\#B7E4C7\\] { background-color: #2D5F45; }
      .lumio-dark .bg-\\[\\#FFB4A2\\] { background-color: #6B2A1F; }
      .lumio-dark .bg-\\[\\#FFE3DE\\] { background-color: #3D1F1A; }
      .lumio-dark .bg-\\[\\#FFD23F\\] { background-color: #C9A024; }
      /* Yellow text on yellow bg fix in dark stat card */
      .lumio-dark .bg-\\[\\#06030D\\] .text-\\[\\#FFD23F\\],
      .lumio-dark .bg-\\[\\#1F1A38\\] .text-\\[\\#FFD23F\\] { color: #FFD23F; }
      /* Inputs in dark mode */
      .lumio-dark input { background-color: #2A2240; color: #FFF6E9; }
      .lumio-dark input::placeholder { color: rgba(255, 246, 233, 0.5); }
      /* Disabled buttons in dark mode */
      .lumio-dark .bg-\\[\\#D9D5E0\\] { background-color: #1A1428; }

      /* ----------- ANIMATIONS ----------- */
      @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
      .anim-pop { animation: pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }

      @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
      .anim-shake { animation: shake 0.4s ease; }

      @keyframes flame-flicker { 0%,100% { transform: scale(1) rotate(-2deg); } 50% { transform: scale(1.08) rotate(2deg); } }
      .anim-flame { animation: flame-flicker 1.2s ease-in-out infinite; }

      @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      .anim-slide { animation: slide-up 0.4s ease both; }

      @keyframes slide-in-right { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
      .anim-slide-r { animation: slide-in-right 0.35s cubic-bezier(0.22, 1, 0.36, 1) both; }

      @keyframes confetti { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(-120vh) rotate(720deg); opacity: 0; } }
      .anim-confetti { animation: confetti 1.6s ease-out forwards; }

      @keyframes correct-pulse {
        0% { transform: scale(1); box-shadow: 3px 3px 0 0 var(--shadow-color); }
        40% { transform: scale(1.04); box-shadow: 0 0 0 8px rgba(46, 196, 105, 0.3), 3px 3px 0 0 var(--shadow-color); }
        100% { transform: scale(1); box-shadow: 3px 3px 0 0 var(--shadow-color); }
      }
      .anim-correct { animation: correct-pulse 0.5s ease; }

      @keyframes wrong-flash {
        0%,100% { transform: translateX(0); }
        25% { transform: translateX(-7px) scale(0.98); }
        50% { transform: translateX(7px); }
        75% { transform: translateX(-3px); }
      }
      .anim-wrong { animation: wrong-flash 0.4s ease; }

      @keyframes match-success {
        0% { transform: scale(1); }

      .anim-match-ok { animation: match-success 0.45s cubic-bezier(0.34, 1.56, 0.64, 1); }

        0% { transform: scale(1); }
        50% { transform: scale(1.06); }
        100% { transform: scale(1); }

        100% { box-shadow: 0 0 0 24px rgba(255, 210, 63, 0); }

      .anim-glow { animation: glow-ring 1.4s ease-out infinite; }

      @keyframes spin-slow { from { transform: rotate(0); } to { transform: rotate(360deg); } }
      .anim-spin-slow { animation: spin-slow 6s linear infinite; }

      @keyframes pulse-soft { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
      .anim-pulse-soft { animation: pulse-soft 1.6s ease-in-out infinite; }
    `;
    document.head.appendChild(style);
  }, []);
  return null;
};

/* =========================================================================
   SOUND SYSTEM – pure Web Audio synthesis, no external files
   ========================================================================= */
let _audioCtx = null;
function getAudioCtx() {
  if (typeof window === 'undefined') return null;
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function tone(freq, dur, type = 'sine', vol = 0.15, when = 0) {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime + when);
  gain.gain.setValueAtTime(0, ctx.currentTime + when);
  gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + when + 0.005);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + when + dur);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ctx.currentTime + when);
  osc.stop(ctx.currentTime + when + dur + 0.05);
}

function themeFullyMastered(state, themeId) {
  const pool = QUESTIONS.filter((q) => q.t === themeId);
  if (pool.length === 0) return false;
  return pool.every((q) => (state.mastery[q.id] || 0) >= 5);
}

// Compare prev vs new state to find newly unlocked badges (ids).
function computeNewBadges(prevState, newState) {
  const prevSet = new Set(prevState.unlockedBadges || []);
  const out = [];
  for (const b of BADGES) {
    if (prevSet.has(b.id)) continue;
    if (b.check(newState)) out.push(b.id);
  }
  return out;
}

/* =========================================================================
   STORAGE & STATE HELPERS
   ========================================================================= */
const STORAGE_KEY = 'lumio_state_v1';

const defaultState = () => ({
  xp: 0,
  streak: 0,
  longestStreak: 0,
  lastSessionDate: null,
  totalSessions: 0,
  totalCorrect: 0,
  totalAnswered: 0,
  mastery: {},
  errorCount: {},
  recentlyAsked: [],
  themeStats: {},
  activeDates: [],
  sessionsToday: 0,
  soundEnabled: true,
  enabledThemes: THEMES.map((t) => t.id),
  userQuestions: [],
  // New: engagement features
  streakFreezesUsed: [],   // dates when a freeze was applied (rolling 7-day = 1 max)
  perfectSessions: 0,      // count of 10/10 sessions
  lateNightSessions: 0,    // sessions started after 23h or before 5h
  unlockedBadges: [],      // ids of unlocked badges
  dailyXp: {},             // { 'YYYY-MM-DD': xp_earned_that_day }
  moreInfoCache: {},       // { questionId: cached_more_info } – persists between sessions
});

// Merge built-in QUESTIONS with imported user questions.
const getAllQuestions = (state) => [...QUESTIONS, ...(state?.userQuestions || [])];

// Days between two YYYY-MM-DD strings (positive integer).
const daysBetween = (d1, d2) => {
  const a = new Date(d1 + 'T00:00:00');
  const b = new Date(d2 + 'T00:00:00');
  return Math.round(Math.abs(b - a) / 86400000);
};

// 1 streak freeze available per rolling 7-day window.
const streakFreezesAvailable = (state) => {
  const used = state.streakFreezesUsed || [];
  const today = todayStr();
  const recent = used.filter((d) => daysBetween(d, today) < 7).length;
  return Math.max(0, 1 - recent);
};

const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const yesterdayStr = () => {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

async function loadState() {
  try {
    const r = await window.storage.get(STORAGE_KEY);
    if (r && r.value) return { ...defaultState(), ...JSON.parse(r.value) };
  } catch (_) {}
  return defaultState();
}
async function saveState(s) {
  try { await window.storage.set(STORAGE_KEY, JSON.stringify(s)); } catch (_) {}
}

// Level: each level requires more XP. level = floor(sqrt(xp / 25)) + 1.
const levelFromXp = (xp) => Math.floor(Math.sqrt(xp / 25)) + 1;
const xpForLevel = (lvl) => Math.pow(lvl - 1, 2) * 25;
const xpInLevelProgress = (xp) => {
  const lvl = levelFromXp(xp);
  const cur = xp - xpForLevel(lvl);
  const need = xpForLevel(lvl + 1) - xpForLevel(lvl);
  return { cur, need, pct: (cur / need) * 100 };
};

// Update streak / day tracking when a session is completed.
function applyDailySession(state) {
  const today = todayStr();
  const s = { ...state };
  s.streakFreezeJustUsed = false; // reset display flag

  // Same-day extra session: just increment counters.
  if (s.lastSessionDate === today) {
    s.sessionsToday = (s.sessionsToday || 0) + 1;
    s.totalSessions = (s.totalSessions || 0) + 1;
    return s;
  }

  // First session of a new calendar day.
  if (s.lastSessionDate === yesterdayStr()) {
    s.streak = (s.streak || 0) + 1;
  } else if (
    s.lastSessionDate &&
    daysBetween(s.lastSessionDate, today) === 2 &&
    streakFreezesAvailable(s) > 0
  ) {
    // 🛡️ Streak freeze: bridges exactly 1 missed day.
    s.streak = (s.streak || 0) + 1;
    s.streakFreezesUsed = [...(s.streakFreezesUsed || []), yesterdayStr()];
    s.streakFreezeJustUsed = true;
  } else {
    s.streak = 1; // reset (skipped 2+ days) or first ever
  }
  s.longestStreak = Math.max(s.longestStreak || 0, s.streak);
  s.lastSessionDate = today;
  s.sessionsToday = 1;
  s.totalSessions = (s.totalSessions || 0) + 1;
  s.activeDates = [...(s.activeDates || []), today];
  return s;
}

// On load: if user missed a day, reset streak (but only display-wise).
function streakIsActive(state) {
  if (!state.lastSessionDate) return false;
  return state.lastSessionDate === todayStr() || state.lastSessionDate === yesterdayStr();
}

// Day number = index in user's progression (1-based). Today's slot in the rotation.
function getDayNumber(state) {
  const today = todayStr();
  const dates = state.activeDates || [];
  const idx = dates.indexOf(today);
  if (idx >= 0) return idx + 1;     // already practiced today
  return dates.length + 1;          // today is the next day
}

// Active themes (fallback to all if user disabled everything by mistake)
function getEnabledThemes(state) {
  const ids = state.enabledThemes || THEMES.map((t) => t.id);
  const active = THEMES.filter((t) => ids.includes(t.id));
  return active.length > 0 ? active : THEMES;
}

// Theme assigned to a given day number (1-based), within the enabled rotation.
function themeOfDay(dayNumber, state) {
  const active = getEnabledThemes(state);
  return active[(dayNumber - 1) % active.length];
}

// Past day numbers where the same theme appeared (excluding the current day).
function pastDaysForTheme(state, dayNumber, themeId) {
  const dates = state.activeDates || [];
  const active = getEnabledThemes(state);
  const out = [];
  dates.forEach((_, i) => {
    const dn = i + 1;
    if (dn === dayNumber) return;
    if (active[(dn - 1) % active.length].id === themeId) out.push(dn);
  });
  return out;
}

/* =========================================================================
   SESSION BUILDER – mastery-weighted selection
   ========================================================================= */
/* Build a session of `size` questions for a theme.
   New rules:
   - True randomization on each call (no deterministic ordering)
   - A question reappears ONLY if user got it wrong in the past
     AND has not yet answered it correctly enough times since (mastery < 3)
   - Otherwise: pick from never-or-recently-correct questions, prioritizing
     those NOT in recentlyAsked
*/
function buildSession(themeId, mastery, errorCount, recentlyAsked, allQuestions, size = 10) {
  const pool = (allQuestions || QUESTIONS).filter((q) => q.t === themeId);
  if (pool.length === 0) return [];

  const recent = new Set(recentlyAsked || []);

  // To-review pool: had at least one error in history, not yet "re-mastered"
  // (mastery < 3 means user hasn't proven they relearned it).
  const toReview = pool.filter((q) =>
    (errorCount[q.id] || 0) > 0 && (mastery[q.id] || 0) < 3
  );

  // Available "fresh" pool: never asked OR mastered+never-erred (eligible only if pool short)
  const neverAsked = pool.filter((q) => mastery[q.id] === undefined);
  const learnedOk = pool.filter((q) =>
    mastery[q.id] !== undefined && (errorCount[q.id] || 0) === 0
  );

  const shuffled = (arr) => {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  };

  // Helper: prefer items not in recentlyAsked
  const splitByRecent = (arr) => {
    const fresh = arr.filter((q) => !recent.has(q.id));
    const seen = arr.filter((q) => recent.has(q.id));
    return [shuffled(fresh), shuffled(seen)];
  };

  // Quotas: ~40% review (when available), rest = new/learned, all randomized.
  const reviewTarget = Math.min(toReview.length, Math.floor(size * 0.4));
  const [reviewFresh, reviewSeen] = splitByRecent(toReview);
  const reviewPicked = [...reviewFresh, ...reviewSeen].slice(0, reviewTarget);

  const newQuota = size - reviewPicked.length;
  const [newFresh, newSeen] = splitByRecent(neverAsked);
  let newPicked = [...newFresh, ...newSeen].slice(0, newQuota);

  let session = [...reviewPicked, ...newPicked];

  // If still short (theme almost exhausted), top up with learnedOk (least-recent-first)
  if (session.length < size) {
    const remaining = pool.filter((q) => !session.includes(q));
    session = [...session, ...shuffled(remaining)].slice(0, size);
  }

  // Final shuffle so review and new questions are interleaved naturally.
  return shuffled(session);
}

/* Build a session for a specific PRACTICE mode (sprint/marathon/weak/mix).
   Returns the array of questions; the daily streak/rotation is NOT touched.
*/
function buildSessionForMode(mode, themeId, state, allQuestions) {
  const shuffle = (arr) => {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  };
  const enabled = state.enabledThemes || THEMES.map((t) => t.id);

  if (mode === 'sprint') {
    return buildSession(themeId, state.mastery, state.errorCount || {}, state.recentlyAsked || [], allQuestions, 5);
  }
  if (mode === 'marathon') {
    return buildSession(themeId, state.mastery, state.errorCount || {}, state.recentlyAsked || [], allQuestions, 20);
  }
  if (mode === 'weak') {
    // All themes — questions previously wrong, not yet relearned (mastery < 3)
    const weakIds = Object.keys(state.errorCount || {}).filter(
      (id) => (state.errorCount[id] || 0) > 0 && (state.mastery[id] || 0) < 3
    );
    const weak = allQuestions.filter((q) => weakIds.includes(q.id) && enabled.includes(q.t));
    return shuffle(weak).slice(0, 10);
  }
  if (mode === 'mix') {
    // Random questions across all enabled themes
    const pool = allQuestions.filter((q) => enabled.includes(q.t));
    return shuffle(pool).slice(0, 10);
  }
  // default: daily mode
  return buildSession(themeId, state.mastery, state.errorCount || {}, state.recentlyAsked || [], allQuestions);
}

const factForTheme = (themeId) => {
  const arr = FACTS.filter((f) => f.t === themeId);
  return arr[Math.floor(Math.random() * arr.length)];

function FactCarousel() {
  const { playSound } = useUI();
  const [idx, setIdx] = useState(() => Math.floor(Math.random() * FACTS.length));
  const fact = FACTS[idx];
  const factTheme = themeById(fact.t) || THEMES[0];
  const TIcon = factTheme.icon;

  const next = () => { playSound('click'); setIdx((idx + 1) % FACTS.length); };
  const prev = () => { playSound('click'); setIdx((idx - 1 + FACTS.length) % FACTS.length); };

  // Touch-swipe support
  const touchStart = useRef(null);
  const onTouchStart = (e) => { touchStart.current = e.touches[0].clientX; };
  const onTouchEnd = (e) => {
    if (touchStart.current == null) return;
    const dx = e.changedTouches[0].clientX - touchStart.current;
    if (dx < -40) next();
    else if (dx > 40) prev();
    touchStart.current = null;
  };

  return (
    <div
      className="bg-[#FFD23F] border-[3px] border-[#1F1A38] rounded-3xl p-4 lumio-shadow-lg relative overflow-hidden"
      onTouchStart={onTouchStart}
      onTouchEnd={onTouchEnd}
    >

        <span className="font-display font-extrabold text-xs uppercase tracking-wider text-[#1F1A38] flex items-center gap-1.5">

  );

function MCQ({ question, onAnswer }) {
  const { playSound } = useUI();

  const pick = (i) => {
    if (revealed) return;
    setSelected(i);
    playSound('select');
  };
  const submit = () => {
    if (selected === null) return;
    setRevealed(true);
    playSound(selected === question.correct ? 'correct' : 'wrong');
  };
  const next = () => { playSound('click'); onAnswer(selected === question.correct); };
  const isRight = selected === question.correct;

  return (
    <div className="flex flex-col h-full">

          {question.opts.map((opt, i) => {
            const isCorrect = i === question.correct;
            const isSelected = i === selected;
            let cls = 'bg-white border-[3px] border-[#1F1A38]';
            let extra = '';
            if (revealed) {
              if (isCorrect) { cls = 'bg-[#B7E4C7] border-[3px] border-[#1F1A38]'; extra = 'anim-correct'; }
              else if (isSelected) { cls = 'bg-[#FFB4A2] border-[3px] border-[#1F1A38]'; extra = 'anim-wrong'; }
              else cls = 'bg-white border-[3px] border-[#1F1A38] opacity-50';
            } else if (isSelected) {
              cls = 'bg-[#FFD23F] border-[3px] border-[#1F1A38]';
              extra = 'anim-select';
            }
            return (
              <button
                key={i}
                onClick={() => pick(i)}
                disabled={revealed}
                className={`w-full text-left px-4 py-3 rounded-2xl font-body font-medium text-[#1F1A38] lumio-shadow-sm lumio-press transition-colors ${cls} ${extra}`}

          <div className="mt-4 anim-slide">
            <div className={`p-3 rounded-2xl border-[3px] border-[#1F1A38] ${isRight ? 'bg-[#B7E4C7]' : 'bg-[#FFE3DE]'}`}>

function MatchPairs({ question, onAnswer }) {
  const { playSound } = useUI();
  const lefts = question.pairs.map(p => p[0]);
  const [rights] = useState(() => {
    const arr = question.pairs.map(p => p[1]);
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  });
  const [selL, setSelL] = useState(null);
  const [selR, setSelR] = useState(null);
  const [matched, setMatched] = useState({});  // left -> right (animated immediately)
  const [confirmed, setConfirmed] = useState({}); // left -> right (animation finished)
  const [wrongFlash, setWrongFlash] = useState(null); // {l, r} flashing red
  const [wrongAttempts, setWrongAttempts] = useState(0);
  const [revealed, setRevealed] = useState(false);

  const pickLeft = (l) => {
    if (matched[l] || revealed) return;
    setSelL(l);
    playSound('select');
  };
  const pickRight = (i) => {
    if (Object.values(matched).includes(rights[i]) || revealed) return;
    setSelR(i);
    playSound('select');
  };

  useEffect(() => {
    if (selL !== null && selR !== null) {
      const correctRight = question.pairs.find(p => p[0] === selL)?.[1];
      if (rights[selR] === correctRight) {
        // SUCCESS
        const newMatched = { ...matched, [selL]: rights[selR] };
        setMatched(newMatched);
        playSound('matchOk');
        setTimeout(() => {
          setConfirmed((c) => ({ ...c, [selL]: rights[selR] }));
        }, 450);
      } else {
        // FAIL
        setWrongAttempts((w) => w + 1);
        setWrongFlash({ l: selL, r: selR });
        playSound('wrong');
        setTimeout(() => setWrongFlash(null), 450);
      }
      setTimeout(() => { setSelL(null); setSelR(null); }, 350);
    }
  }, [selL, selR]);

  useEffect(() => {
    if (Object.keys(matched).length === question.pairs.length) {
      setTimeout(() => {
        setRevealed(true);
        playSound(wrongAttempts === 0 ? 'complete' : 'correct');
      }, 600);
    }
  }, [matched]);

  return (
    <div className="flex flex-col h-full">
      <div className="flex-1 px-4 py-2">
        <div className="text-xs font-body uppercase tracking-wider text-[#1F1A38] opacity-50 mb-2">Associer les paires</div>
        <h2 className="font-display font-bold text-xl text-[#1F1A38] leading-tight mb-4">{question.q}</h2>
        <div className="grid grid-cols-2 gap-2">
          <div className="space-y-2">
            {lefts.map((l) => {
              const isMatched = !!matched[l];
              const isConfirmed = !!confirmed[l];
              const isSelected = selL === l;
              const isWrongFlash = wrongFlash && wrongFlash.l === l;
              let bgClass = 'bg-white';
              let extra = '';
              if (isConfirmed) bgClass = 'bg-[#B7E4C7] opacity-70';
              else if (isMatched) { bgClass = 'bg-[#B7E4C7]'; extra = 'anim-match-ok'; }
              else if (isWrongFlash) { bgClass = 'bg-[#FFB4A2]'; extra = 'anim-wrong'; }
              else if (isSelected) { bgClass = 'bg-[#FFD23F]'; extra = 'anim-select'; }
              return (
                <button
                  key={l}
                  onClick={() => pickLeft(l)}
                  disabled={isMatched}
                  className={`w-full px-3 py-3 rounded-xl font-body font-medium text-sm text-[#1F1A38] border-[3px] border-[#1F1A38] lumio-shadow-sm transition-all ${bgClass} ${extra}`}
                >{l}</button>
              );
            })}
          </div>
          <div className="space-y-2">
            {rights.map((r, i) => {
              const isMatchedR = Object.values(matched).includes(r);
              const isConfirmedR = Object.values(confirmed).includes(r);
              const isSelected = selR === i;
              const isWrongFlash = wrongFlash && wrongFlash.r === i;
              let bgClass = 'bg-white';
              let extra = '';
              if (isConfirmedR) bgClass = 'bg-[#B7E4C7] opacity-70';
              else if (isMatchedR) { bgClass = 'bg-[#B7E4C7]'; extra = 'anim-match-ok'; }
              else if (isWrongFlash) { bgClass = 'bg-[#FFB4A2]'; extra = 'anim-wrong'; }
              else if (isSelected) { bgClass = 'bg-[#FFD23F]'; extra = 'anim-select'; }
              return (
                <button
                  key={i}
                  onClick={() => pickRight(i)}
                  disabled={isMatchedR}
                  className={`w-full px-3 py-3 rounded-xl font-body font-medium text-sm text-[#1F1A38] border-[3px] border-[#1F1A38] lumio-shadow-sm transition-all ${bgClass} ${extra}`}
                >{r}</button>
              );
            })}
          </div>
        </div>
        {wrongAttempts > 0 && !revealed && (
          <div className="mt-3 text-sm font-body text-[#FF6B5B] anim-pulse-soft">Erreurs: {wrongAttempts}</div>
        )}
        {revealed && (
          <div className="mt-4 anim-slide">
            <div className={`p-3 rounded-2xl border-[3px] border-[#1F1A38] ${wrongAttempts === 0 ? 'bg-[#B7E4C7]' : 'bg-[#FFE3DE]'}`}>
              <div className="font-display font-bold text-[#1F1A38] mb-1">
                {wrongAttempts === 0 ? '✓ Parfait !' : `${wrongAttempts} erreur${wrongAttempts > 1 ? 's' : ''}`}
              </div>
              <div className="text-sm font-body text-[#1F1A38]">{question.ex}</div>
            </div>
            <MoreInfoSection question={question} />
          </div>
        )}
      </div>
      <div className="p-4">
        {revealed && (
          <BigButton onClick={() => { playSound('click'); onAnswer(wrongAttempts === 0); }} color="#1F1A38" textColor="#FFF6E9">Continuer</BigButton>
        )}
      </div>
    </div>
  );
}

function OrderExercise({ question, onAnswer }) {
  const { playSound } = useUI();
  const [items, setItems] = useState(() => {
    const arr = [...question.items];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  });
  const [revealed, setRevealed] = useState(false);
  const [movingIdx, setMovingIdx] = useState(null);

  const moveUp = (i) => {
    if (i === 0 || revealed) return;
    const a = [...items];
    [a[i-1], a[i]] = [a[i], a[i-1]];
    setItems(a);
    setMovingIdx(i - 1);
    playSound('select');
    setTimeout(() => setMovingIdx(null), 250);
  };
  const moveDown = (i) => {
    if (i === items.length - 1 || revealed) return;
    const a = [...items];
    [a[i+1], a[i]] = [a[i], a[i+1]];
    setItems(a);
    setMovingIdx(i + 1);
    playSound('select');
    setTimeout(() => setMovingIdx(null), 250);
  };

  const isCorrect = items.every((v, i) => v === question.items[i]);
  const submit = () => {
    setRevealed(true);
    playSound(isCorrect ? 'correct' : 'wrong');
  };

  return (
    <div className="flex flex-col h-full">
      <div className="flex-1 px-4 py-2">
        <div className="text-xs font-body uppercase tracking-wider text-[#1F1A38] opacity-50 mb-2">Ordre chronologique</div>
        <h2 className="font-display font-bold text-xl text-[#1F1A38] leading-tight mb-4">{question.q}</h2>
        <div className="space-y-2">
          {items.map((item, i) => {
            const correctPos = question.items.indexOf(item);
            let bg = '#2A2240';
            let extra = '';
            if (revealed) {
              bg = correctPos === i ? '#2D5F45' : '#6B2A1F';
              extra = correctPos === i ? 'anim-correct' : 'anim-wrong';
            } else if (movingIdx === i) extra = 'anim-select';
            return (
              <div key={item} className="flex items-center gap-2">
                <div className="font-display font-extrabold text-[#1F1A38] w-6 text-center">{i+1}</div>
                <div
                  style={{ backgroundColor: bg }}
                  className={`flex-1 px-3 py-3 rounded-xl font-body font-medium text-sm text-[#1F1A38] border-[3px] border-[#1F1A38] lumio-shadow-sm transition-all ${extra}`}
                >{item}</div>
                {!revealed && (
                  <div className="flex flex-col gap-1">
                    <button onClick={() => moveUp(i)} className="bg-[#FFD23F] border-[3px] border-[#1F1A38] rounded-lg w-8 h-7 font-bold text-xs lumio-press text-[#1F1A38]">▲</button>
                    <button onClick={() => moveDown(i)} className="bg-[#FFD23F] border-[3px] border-[#1F1A38] rounded-lg w-8 h-7 font-bold text-xs lumio-press text-[#1F1A38]">▼</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
        {revealed && (
          <div className="mt-4 anim-slide">
            <div className={`p-3 rounded-2xl border-[3px] border-[#1F1A38] ${isCorrect ? 'bg-[#B7E4C7]' : 'bg-[#FFE3DE]'}`}>
              <div className="font-display font-bold text-[#1F1A38] mb-1">
                {isCorrect ? '✓ Ordre parfait !' : 'Pas dans le bon ordre'}
              </div>
              <div className="text-sm font-body text-[#1F1A38]">{question.ex}</div>
              {!isCorrect && (
                <div className="text-xs font-body text-[#1F1A38] mt-2 opacity-70">Bon ordre : {question.items.join(' → ')}</div>
              )}
            </div>
            <MoreInfoSection question={question} />
          </div>
        )}
      </div>
      <div className="p-4">
        {revealed ? <BigButton onClick={() => { playSound('click'); onAnswer(isCorrect); }} color="#1F1A38" textColor="#FFF6E9">Continuer</BigButton>
                  : <BigButton onClick={submit} color="#FF6B5B">Valider</BigButton>}
      </div>
    </div>
  );
}

function TypeAnswer({ question, onAnswer }) {
  const { playSound } = useUI();
  const [val, setVal] = useState('');
  const [revealed, setRevealed] = useState(false);
  const norm = (s) => s.toLowerCase().trim().replace(/['']/g, "'").replace(/\s+/g, ' ');
  const isCorrect = question.accepts.some(a => norm(val) === norm(a));
  const submit = () => {
    if (!val.trim()) return;
    setRevealed(true);
    playSound(isCorrect ? 'correct' : 'wrong');
  };
  return (
    <div className="flex flex-col h-full">
      <div className="flex-1 px-4 py-2">
        <div className="text-xs font-body uppercase tracking-wider text-[#1F1A38] opacity-50 mb-2">Réponse libre</div>
        <h2 className="font-display font-bold text-2xl text-[#1F1A38] leading-tight mb-6">{question.q}</h2>
        <input
          type="text"
          value={val}
          onChange={(e) => !revealed && setVal(e.target.value)}
          onKeyDown={(e) => e.key === 'Enter' && !revealed && submit()}
          disabled={revealed}
          placeholder="Tape ta réponse..."
          className={`w-full px-4 py-4 rounded-2xl border-[3px] border-[#1F1A38] bg-white font-body text-lg text-[#1F1A38] lumio-shadow-sm focus:outline-none ${revealed ? (isCorrect ? 'anim-correct' : 'anim-wrong') : ''}`}
          style={{ backgroundColor: revealed ? (isCorrect ? '#B7E4C7' : '#FFB4A2') : undefined }}
          autoFocus
        />
        {revealed && (
          <div className="mt-4 anim-slide">
            <div className={`p-3 rounded-2xl border-[3px] border-[#1F1A38] ${isCorrect ? 'bg-[#B7E4C7]' : 'bg-[#FFE3DE]'}`}>
              <div className="font-display font-bold text-[#1F1A38] mb-1">
                {isCorrect ? '✓ Bonne réponse !' : `✗ Réponse : ${question.accepts[0]}`}
              </div>
              <div className="text-sm font-body text-[#1F1A38]">{question.ex}</div>
            </div>
            <MoreInfoSection question={question} />
          </div>
        )}
      </div>
      <div className="p-4">
        {revealed ? <BigButton onClick={() => { playSound('click'); onAnswer(isCorrect); }} color="#1F1A38" textColor="#FFF6E9">Continuer</BigButton>
                  : <BigButton onClick={submit} disabled={!val.trim()} color="#FF6B5B">Valider</BigButton>}
      </div>
    </div>
  );
}

/* =========================================================================
   MORE INFO – calls the Anthropic API to fetch additional context
   ========================================================================= */
function questionAnswerString(q) {
  const type = q.type || 'mcq';
  if (type === 'mcq' || type === 'fill') return q.opts?.[q.correct] ?? '';
  if (type === 'tf') return q.correct ? 'Vrai' : 'Faux';
  if (type === 'match') return (q.pairs || []).map((p) => `${p[0]} → ${p[1]}`).join(' ; ');
  if (type === 'order') return (q.items || []).join(' → ');
  if (type === 'type') return q.accepts?.[0] || '';
  return '';
}

function MoreInfoSection({ question }) {
  return null; // disabled in standalone build
  const { playSound, moreInfoCache, saveMoreInfo } = useUI();
  const cached = moreInfoCache?.[question.id];
  const [info, setInfo] = useState(cached || null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const loadMore = async () => {
    setLoading(true);
    setError(null);
    playSound('click');
    try {
      const theme = THEMES.find((t) => t.id === question.t);
      const prompt = `Tu es un assistant culturel. Donne 2 à 4 phrases courtes de contexte intéressant supplémentaire sur le sujet ci-dessous, en français, ton factuel et amical. Ne répète pas la question ni la réponse, ajoute du contexte (anecdote, conséquence, lien historique, chiffre marquant). Ne mets pas de titre, juste le texte.

Thème : ${theme?.name || question.t}
Question : ${question.q}
Réponse : ${questionAnswerString(question)}
Contexte initial : ${question.ex || '(aucun)'}`;

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 400,
          messages: [{ role: 'user', content: prompt }],
        }),
      });
      if (!res.ok) throw new Error('API ' + res.status);
      const data = await res.json();
      const text = (data.content || [])
        .filter((c) => c.type === 'text')
        .map((c) => c.text)
        .join('')
        .trim();
      if (!text) throw new Error('Réponse vide');
      setInfo(text);
      saveMoreInfo(question.id, text);
      playSound('correct');
    } catch (e) {
      setError("Impossible de récupérer plus d'infos.");
      playSound('wrong');
    } finally {
      setLoading(false);
    }
  };

  if (info) {
    return (
      <div className="mt-3 anim-slide">
        <div className="p-3 rounded-2xl border-[3px] border-[#1F1A38] bg-[#FFD23F]">
          <div className="font-display font-bold text-xs text-[#1F1A38] uppercase tracking-wider mb-1 flex items-center gap-1">
            <Sparkles size={12} strokeWidth={3} /> Pour aller plus loin
          </div>
          <div className="font-body text-sm text-[#1F1A38] leading-relaxed whitespace-pre-line">{info}</div>
        </div>
      </div>
    );
  }

  return (
    <button
      onClick={loadMore}
      disabled={loading}
      className="mt-3 w-full bg-[#1F1A38] border-[3px] border-[#1F1A38] rounded-xl py-2 px-3 lumio-shadow-sm lumio-press font-display font-bold text-sm flex items-center justify-center gap-2"
      style={{ color: '#FFD23F' }}
    >
      {loading ? (
        <span className="anim-pulse-soft flex items-center gap-2">
          <Sparkles size={14} className="anim-spin-slow" /> Recherche en cours...
        </span>
      ) : error ? (
        <span className="text-[#FFB4A2]">{error} Retoucher pour réessayer</span>
      ) : (
        <>
          <Sparkles size={14} strokeWidth={2.5} />
          En savoir plus
        </>
      )}
    </button>
  );
}

/* ----------- Session screen ---------- */

function SessionScreen({ themeId, mode, state, setState, onBack, onComplete }) {
  const { playSound } = useUI();
  const theme = themeById(themeId) || THEMES[0];
  const [session, setSession] = useState(() =>
    buildSessionForMode(mode, themeId, state, getAllQuestions(state))
  );
  const [originalSize] = useState(() => session.length);
  const [idx, setIdx] = useState(0);
  const [showFact, setShowFact] = useState(mode !== 'weak' && mode !== 'mix');
  const [fact] = useState(() => factForTheme(themeId) || FACTS[Math.floor(Math.random() * FACTS.length)]);
  const [results, setResults] = useState({ correct: 0, freshCorrect: 0, retryCorrect: 0, wrongTwice: 0, xpGained: 0 });
  const [retryQueue, setRetryQueue] = useState([]);
  const [xpFloater, setXpFloater] = useState(null);

  const total = session.length;
  const isPractice = mode && mode !== 'daily';

  const onAnswer = useCallback((correct) => {
    const q = session[idx];

    const newMastery = { ...state.mastery };
    const cur = newMastery[q.id] || 0;
    newMastery[q.id] = correct ? Math.min(5, cur + 1) : 0;

    const newErrorCount = { ...(state.errorCount || {}) };
    if (!correct) newErrorCount[q.id] = (newErrorCount[q.id] || 0) + 1;

    const newRecent = [q.id, ...(state.recentlyAsked || []).filter((id) => id !== q.id)].slice(0, 30);

    const ts = { ...(state.themeStats || {}) };
    if (!ts[q.t]) ts[q.t] = { answered: 0, correct: 0 };
    ts[q.t] = {
      answered: ts[q.t].answered + 1,
      correct: ts[q.t].correct + (correct ? 1 : 0),
    };

    const xpGain = correct ? 10 : 2;
    if (correct) {
      setXpFloater({ value: xpGain, key: Date.now() });
      setTimeout(() => setXpFloater(null), 1100);
    }

    // Score on 10 system: 1pt fresh-correct, 0.5pt retry-correct, 0pt wrong-twice
    const isRetryAttempt = !!q.isRetry;
    const newResults = {
      correct: results.correct + (correct ? 1 : 0),
      freshCorrect: results.freshCorrect + (correct && !isRetryAttempt ? 1 : 0),
      retryCorrect: results.retryCorrect + (correct && isRetryAttempt ? 1 : 0),
      wrongTwice: results.wrongTwice + (!correct && isRetryAttempt ? 1 : 0),
      xpGained: results.xpGained + xpGain,
    };
    setResults(newResults);

    let newQueue = retryQueue;
    if (!correct && !q.isRetry) {
      newQueue = [...retryQueue, { ...q, isRetry: true }];
      setRetryQueue(newQueue);
    }

    setState({
      ...state,
      mastery: newMastery,
      errorCount: newErrorCount,
      recentlyAsked: newRecent,
      themeStats: ts,
      totalAnswered: (state.totalAnswered || 0) + 1,
      totalCorrect: (state.totalCorrect || 0) + (correct ? 1 : 0),
    });

    if (idx + 1 < total) {
      setIdx(idx + 1);
    } else if (newQueue.length > 0) {
      setSession([...session, ...newQueue]);
      setRetryQueue([]);
      setIdx(idx + 1);
    } else {
      playSound('complete');
      onComplete({ ...newResults, originalSize }, session.length, mode);
    }
  }, [idx, session, state, setState, results, retryQueue, total, onComplete, mode, playSound]);

  if (session.length === 0) {
    // Empty session (e.g. weak mode with no errors yet)
    return (
      <div className="flex flex-col h-full px-4 pt-4 anim-slide">
        <button onClick={() => { playSound('click'); onBack(); }} className="bg-white border-[3px] border-[#1F1A38] rounded-xl p-2 lumio-shadow-sm lumio-press w-fit mb-6">
          <ArrowLeft size={18} className="text-[#1F1A38]" strokeWidth={2.5} />
        </button>
        <div className="flex-1 flex items-center justify-center">
          <div className="bg-[#FFD23F] border-[3px] border-[#1F1A38] rounded-3xl p-6 lumio-shadow-lg text-center">
            <Sparkles size={32} className="text-[#1F1A38] mx-auto mb-3" />
            <div className="font-display font-bold text-xl text-[#1F1A38] mb-2">Aucune question à réviser !</div>
            <div className="font-body text-sm text-[#1F1A38] opacity-80">Tu n'as encore raté aucune question. Continue les sessions normales pour en accumuler.</div>
          </div>
        </div>
      </div>
    );
  }

  if (showFact) {
    return (
      <div className="flex flex-col h-full">
        <div className="flex items-center gap-3 px-4 pt-4">
          <button onClick={() => { playSound('click'); onBack(); }} className="bg-white border-[3px] border-[#1F1A38] rounded-xl p-2 lumio-shadow-sm lumio-press">
            <ArrowLeft size={18} className="text-[#1F1A38]" strokeWidth={2.5} />
          </button>
          <div className="flex-1 h-3 bg-white border-[3px] border-[#1F1A38] rounded-full overflow-hidden">
            <div className="h-full transition-all duration-500" style={{ width: '5%', backgroundColor: theme.color }} />
          </div>
        </div>
        <FactCard fact={fact} theme={theme} onContinue={() => setShowFact(false)} />
      </div>
    );
  }

  const q = session[idx];
  const progress = ((idx + 1) / session.length) * 100;
  const isRetryPhase = q?.isRetry === true;
  const retryNum = isRetryPhase ? idx - originalSize + 1 : 0;
  const retryTotal = session.length - originalSize;
  const Component = {
    'tf': TrueFalse,
    'fill': FillBlank,
    'match': MatchPairs,
    'order': OrderExercise,
    'type': TypeAnswer,
  }[q.type] || MCQ;

  return (
    <div className="flex flex-col h-full relative">
      <div className="flex items-center gap-3 px-4 pt-4">
        <button onClick={() => { playSound('click'); onBack(); }} className="bg-white border-[3px] border-[#1F1A38] rounded-xl p-2 lumio-shadow-sm lumio-press">
          <X size={18} className="text-[#1F1A38]" strokeWidth={2.5} />
        </button>
        <div className="flex-1 h-3 bg-white border-[3px] border-[#1F1A38] rounded-full overflow-hidden">
          <div className="h-full transition-all duration-500" style={{ width: `${progress}%`, backgroundColor: theme.color }} />
        </div>
        {isRetryPhase ? (
          <div className="flex items-center gap-1 bg-[#FFD23F] border-[3px] border-[#1F1A38] rounded-xl px-2 py-1">
            <RotateCcw size={12} className="text-[#1F1A38]" strokeWidth={3} />
            <span className="font-display font-extrabold text-xs text-[#1F1A38]">{retryNum}/{retryTotal}</span>
          </div>
        ) : (
          <div className="font-display font-bold text-sm text-[#1F1A38]">{idx+1}/{originalSize}</div>
        )}
      </div>

      {/* Retry phase banner */}
      {isRetryPhase && (
        <div className="px-4 pt-3">
          <div className="bg-[#FFD23F] border-[3px] border-[#1F1A38] rounded-xl px-3 py-2 lumio-shadow-sm flex items-center gap-2 anim-pop">
            <RotateCcw size={18} className="text-[#1F1A38] flex-shrink-0" strokeWidth={3} />
            <div className="flex-1 min-w-0">
              <div className="font-display font-extrabold text-sm text-[#1F1A38] leading-tight">
                Révision de tes erreurs
              </div>
              <div className="font-body text-xs text-[#1F1A38] opacity-80 leading-tight">
                On refait les questions ratées pour bien les comprendre.
              </div>
            </div>
          </div>
        </div>
      )}

      {/* XP floater */}
      {xpFloater && (
        <div
          key={xpFloater.key}
          className="absolute left-1/2 top-24 z-50 anim-xp pointer-events-none"
        >
          <div className="bg-[#FFD23F] border-[3px] border-[#1F1A38] rounded-2xl px-3 py-1 lumio-shadow-sm flex items-center gap-1">
            <Zap size={14} className="text-[#1F1A38]" strokeWidth={3} />
            <span className="font-display font-extrabold text-[#1F1A38]">+{xpFloater.value} XP</span>
          </div>
        </div>
      )}

      <div className="flex-1 anim-slide-r" key={`${q.id}-${idx}`}>
        <Component question={q} onAnswer={onAnswer} />
      </div>
    </div>
  );
}

/* ----------- End screen ---------- */

function EndScreen({ results, total, themeId, mode, prevState, newState, newBadges, onHome }) {
  const { playSound } = useUI();
  const theme = themeById(themeId) || THEMES[0];
  // New scoring: 1pt fresh-correct, 0.5pt retry-correct, 0pt wrong-twice
  const baseQ = results.originalSize || total;
  const points = (results.freshCorrect || 0) + 0.5 * (results.retryCorrect || 0);
  const scoreOver10 = baseQ > 0 ? (points / baseQ) * 10 : 0;
  const scoreDisplay = Number.isInteger(scoreOver10) ? `${scoreOver10}` : scoreOver10.toFixed(1);
  const accuracy = Math.round((points / baseQ) * 100);
  const leveledUp = levelFromXp(newState.xp) > levelFromXp(prevState.xp);
  const streakUp = newState.streak > prevState.streak;
  const freezeUsed = newState.streakFreezeJustUsed === true;
  const isPractice = mode && mode !== 'daily';

  // Play celebratory sound on mount (priority: badge > levelUp > streak)
  useEffect(() => {
    if (newBadges && newBadges.length > 0) {
      setTimeout(() => playSound('badge'), 400);
    } else if (leveledUp) {
      setTimeout(() => playSound('levelUp'), 300);
    } else if (streakUp) {
      setTimeout(() => playSound('streak'), 300);
    }
  }, []); // eslint-disable-line

  const confetti = useMemo(() => Array.from({ length: 30 }, (_, i) => ({
    left: Math.random() * 100,
    delay: Math.random() * 0.5,
    color: ['#FF6B5B','#FFD23F','#0D7377','#7209B7','#3D5AFE'][i % 5],
    rotation: Math.random() * 360,
  })), []);

  const unlockedBadgeObjs = (newBadges || []).map((id) => BADGES.find((b) => b.id === id)).filter(Boolean);

  return (
    <div className="flex flex-col h-full relative overflow-hidden anim-slide">
      {accuracy >= 70 && (
        <div className="absolute inset-0 pointer-events-none overflow-hidden">
          {confetti.map((c, i) => (
            <div
              key={i}
              className="absolute bottom-0 w-2 h-3 anim-confetti"
              style={{
                left: `${c.left}%`,
                backgroundColor: c.color,
                animationDelay: `${c.delay}s`,
                transform: `rotate(${c.rotation}deg)`,
              }}
            />
          ))}
        </div>
      )}

      <div className="flex-1 px-4 py-4 flex flex-col justify-center relative z-10 overflow-y-auto">
        <div className="text-center mb-5">
          <div
            className="w-20 h-20 rounded-3xl border-[3px] border-[#1F1A38] flex items-center justify-center mx-auto mb-3 lumio-shadow anim-pop"
            style={{ backgroundColor: theme.color }}
          >
            <Sparkles size={36} className="text-white" strokeWidth={2.5} />
          </div>
          <h2 className="font-display font-extrabold text-3xl text-[#1F1A38]">Session terminée !</h2>
          <p className="font-body text-[#1F1A38] opacity-70 mt-1">
            {isPractice
              ? `Mode ${mode === 'sprint' ? 'Sprint' : mode === 'marathon' ? 'Marathon' : mode === 'weak' ? 'Points faibles' : 'Mix'}`
              : `Thème : ${theme.name}`}
          </p>
        </div>

        <div className="grid grid-cols-3 gap-3 mb-3">
          <StatCard label="précision" value={`${accuracy}%`} color="#0D7377" />
          <StatCard label="XP gagnés" value={`+${results.xpGained}`} color="#FF6B5B" />
          <StatCard label="note" value={`${scoreDisplay}/10`} color="#7209B7" />
        </div>

        {/* Badge unlock banners */}
        {unlockedBadgeObjs.map((badge, i) => {
          const BIcon = badge.icon;
          return (
            <div key={badge.id} className="bg-[#FFD23F] border-[3px] border-[#1F1A38] rounded-2xl p-3 mb-2 lumio-shadow flex items-center gap-3 anim-pop" style={{ animationDelay: `${i * 0.15}s` }}>
              <div
                className="w-12 h-12 rounded-xl border-[3px] border-[#1F1A38] flex items-center justify-center flex-shrink-0"
                style={{ backgroundColor: badge.color }}
              >
                <BIcon size={22} className="text-white" strokeWidth={2.5} />
              </div>
              <div className="flex-1 min-w-0">
                <div className="font-display font-extrabold text-xs text-[#1F1A38] uppercase tracking-wider">🏆 Badge débloqué !</div>
                <div className="font-display font-bold text-base text-[#1F1A38] leading-tight">{badge.name}</div>
                <div className="font-body text-xs text-[#1F1A38] opacity-80">{badge.desc}</div>
              </div>
            </div>
          );
        })}

        {streakUp && !freezeUsed && (
          <div className="bg-[#FFD23F] border-[3px] border-[#1F1A38] rounded-2xl p-3 mb-2 lumio-shadow flex items-center gap-3 anim-pop">
            <Flame size={32} className="fill-[#FF6B5B] text-[#1F1A38] anim-flame" />
            <div>
              <div className="font-display font-extrabold text-[#1F1A38]">Série maintenue !</div>
              <div className="font-body text-sm text-[#1F1A38]">{newState.streak} jour{newState.streak > 1 ? 's' : ''} d'affilée 🔥</div>
            </div>
          </div>
        )}

        {freezeUsed && (
          <div className="bg-[#0D7377] border-[3px] border-[#1F1A38] rounded-2xl p-3 mb-2 lumio-shadow flex items-center gap-3 anim-pop">
            <div className="text-3xl">🛡️</div>
            <div className="text-white">
              <div className="font-display font-extrabold">Streak freeze utilisé !</div>
              <div className="font-body text-sm opacity-90">{newState.streak} jour{newState.streak > 1 ? 's' : ''} d'affilée — sauvée !</div>
            </div>

        )}

        {leveledUp && (
          <div className="bg-[#1F1A38] rounded-2xl p-3 mb-2 lumio-shadow flex items-center gap-3 anim-pop border-[3px] border-[#1F1A38]">

            <div className="text-white">
              <div className="font-display font-extrabold">Niveau supérieur !</div>
              <div className="font-body text-sm opacity-80">Tu es désormais niveau {levelFromXp(newState.xp)}</div>
            </div>
          </div>
        )}
      </div>

      <div className="p-4 relative z-10">
        <BigButton onClick={() => { playSound('click'); onHome(); }} color="#FF6B5B">Retour à l'accueil</BigButton>
      </div>
    </div>
  );
}

      const seen = pool.filter((q) => state.mastery[q.id] !== undefined).length;
      const mastered = pool.filter((q) => (state.mastery[q.id] || 0) >= 5).length;
      const ts = (state.themeStats || {})[t.id] || { answered: 0, correct: 0 };
      const acc = ts.answered ? Math.round((ts.correct / ts.answered) * 100) : null;
      return { theme: t, total: pool.length, seen, mastered, answered: ts.answered, correct: ts.correct, acc };
    });
  }, [state]);

  const overallAcc = state.totalAnswered ? Math.round((state.totalCorrect / state.totalAnswered) * 100) : 0;
  const totalMastered = Object.values(state.mastery || {}).filter((m) => m >= 5).length;

      const s = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

/* =========================================================================
   IMPORT SCREEN – paste a JSON pack of questions provided by Claude
   ========================================================================= */
function validateImportedQuestion(q, themeIds) {
  if (!q || typeof q !== 'object') return 'pas un objet';
  if (!themeIds.includes(q.t)) return `thème "${q.t}" inconnu`;
  if (typeof q.q !== 'string' || !q.q.trim()) return 'question manquante';
  const type = q.type || 'mcq';
  if (type === 'mcq') {
    if (!Array.isArray(q.opts) || q.opts.length < 2) return 'opts manquantes';
    if (typeof q.correct !== 'number' || q.correct < 0 || q.correct >= q.opts.length) return 'correct invalide';
  } else if (type === 'tf') {
    if (typeof q.correct !== 'boolean') return 'correct doit être true/false';
  } else if (type === 'fill') {
    if (!Array.isArray(q.opts) || q.opts.length < 2) return 'opts manquantes';
    if (typeof q.correct !== 'number') return 'correct invalide';
    if (!q.q.includes('___')) return 'manque ___ dans la question';
  } else if (type === 'match') {
    if (!Array.isArray(q.pairs) || q.pairs.length < 2) return 'pairs manquantes';
  } else if (type === 'order') {
    if (!Array.isArray(q.items) || q.items.length < 2) return 'items manquants';
  } else if (type === 'type') {
    if (!Array.isArray(q.accepts) || q.accepts.length === 0) return 'accepts manquants';
  } else {
    return `type "${type}" inconnu`;
  }
  return null;
}

function ImportScreen({ state, setState, onBack }) {
  const { playSound } = useUI();
  const [text, setText] = useState('');
  const [error, setError] = useState(null);
  const [success, setSuccess] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const userQ = state.userQuestions || [];

  const tryPaste = async () => {
    try {
      const t = await navigator.clipboard.readText();
      if (t) { setText(t); playSound('select'); }
    } catch (_) {
      setError("Impossible d'accéder au presse-papier — colle manuellement.");
    }
  };

  const doImport = () => {
    setError(null);
    setSuccess(null);
    const raw = text.trim();
    if (!raw) { setError("Colle d'abord du JSON."); return; }
    let parsed;
    try {
      parsed = JSON.parse(raw);
    } catch (e) {
      setError("JSON invalide — vérifie qu'il commence par [ et finit par ]");
      playSound('wrong');
      return;
    }
    if (!Array.isArray(parsed)) {
      setError("Le JSON doit être un tableau (commence par [).");
      playSound('wrong');
      return;
    }
    const themeIds = THEMES.map((t) => t.id);
    const valid = [];
    const errors = [];
    parsed.forEach((q, i) => {
      const err = validateImportedQuestion(q, themeIds);
      if (err) {
        errors.push(`#${i + 1}: ${err}`);
      } else {
        // Force unique IDs to avoid collisions
        const newId = `u_${q.t}_${Date.now()}_${i}`;
        valid.push({ ...q, id: newId });
      }
    });
    if (valid.length === 0) {
      setError(`Aucune question valide. Erreurs : ${errors.slice(0, 3).join(' · ')}`);
      playSound('wrong');
      return;
    }
    setState((s) => ({ ...s, userQuestions: [...(s.userQuestions || []), ...valid] }));
    let msg = `${valid.length} question${valid.length > 1 ? 's' : ''} importée${valid.length > 1 ? 's' : ''} !`;
    if (errors.length > 0) msg += ` (${errors.length} ignorée${errors.length > 1 ? 's' : ''})`;
    setSuccess(msg);
    setText('');
    playSound('complete');
  };

  const deleteAll = () => {
    if (!confirmDelete) {
      setConfirmDelete(true);
      setTimeout(() => setConfirmDelete(false), 3000);
      return;
    }
    setState((s) => ({ ...s, userQuestions: [] }));
    setConfirmDelete(false);
    setSuccess('Toutes tes questions perso ont été supprimées.');
    playSound('toggle');
  };

  return (
    <div className="flex flex-col h-full anim-slide">
      <div className="flex items-center gap-3 px-4 pt-4 pb-2">
        <button onClick={() => { playSound('click'); onBack(); }} className="bg-white border-[3px] border-[#1F1A38] rounded-xl p-2 lumio-shadow-sm lumio-press">
          <ArrowLeft size={18} className="text-[#1F1A38]" strokeWidth={2.5} />
        </button>
        <h1 className="font-display font-extrabold text-2xl text-[#1F1A38]">Importer</h1>
      </div>

      <div className="flex-1 overflow-y-auto px-4 pb-6">
        {/* Instructions */}
        <div className="bg-[#FFD23F] border-[3px] border-[#1F1A38] rounded-2xl p-3 lumio-shadow-sm mb-4">
          <div className="font-display font-bold text-sm text-[#1F1A38] mb-1">Comment ça marche</div>
          <div className="font-body text-xs text-[#1F1A38] leading-relaxed">
            Demande à Claude un pack de questions (« génère-moi 20 questions sur la philosophie au format Lumio »). Il te donnera un JSON. Colle-le ici, valide, et c'est dans ta rotation.
          </div>
        </div>

        {/* Theme codes reference */}
        <div className="bg-[#2A2240] border-[3px] border-[#1F1A38] rounded-2xl p-3 lumio-shadow-sm mb-4">
          <div className="font-display font-bold text-xs uppercase tracking-wider text-[#1F1A38] opacity-60 mb-2">
            Codes de thèmes
          </div>
          <div className="grid grid-cols-3 gap-1.5">
            {THEMES.map((t) => (
              <div key={t.id} className="flex items-center gap-1.5">
                <span
                  className="font-display font-extrabold text-xs text-white px-1.5 py-0.5 rounded"
                  style={{ backgroundColor: t.color }}
                >
                  {t.id}
                </span>
                <span className="font-body text-xs text-[#1F1A38] opacity-80 truncate">{t.name.split(' ')[0]}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Textarea */}
        <div className="mb-3">
          <label className="font-display font-bold text-sm text-[#1F1A38] mb-2 block">
            Colle le JSON ici
          </label>
          <textarea
            value={text}
            onChange={(e) => { setText(e.target.value); setError(null); setSuccess(null); }}
            placeholder='[
  {"t":"h","q":"...","opts":["a","b","c","d"],"correct":0,"ex":"..."},
  ...
]'
            rows={10}
            className="w-full px-3 py-3 rounded-2xl border-[3px] border-[#1F1A38] bg-white font-mono text-xs text-[#1F1A38] lumio-shadow-sm focus:outline-none resize-y"
            style={{ minHeight: '160px' }}
          />
        </div>

        {/* Action buttons */}
        <div className="flex gap-2 mb-3">
          <button
            onClick={tryPaste}
            className="flex-1 bg-white border-[3px] border-[#1F1A38] rounded-2xl py-3 lumio-shadow-sm lumio-press font-display font-bold text-sm text-[#1F1A38]"
          >
            📋 Coller
          </button>
          <button
            onClick={() => { setText(''); setError(null); setSuccess(null); }}
            className="flex-1 bg-white border-[3px] border-[#1F1A38] rounded-2xl py-3 lumio-shadow-sm lumio-press font-display font-bold text-sm text-[#1F1A38]"
          >
            ✕ Vider
          </button>
        </div>

        <BigButton onClick={doImport} disabled={!text.trim()} color="#FF6B5B">
          Importer
        </BigButton>

        {/* Error / success */}
        {error && (
          <div className="mt-3 p-3 rounded-2xl border-[3px] border-[#1F1A38] bg-[#6B2A1F] anim-shake">
            <div className="font-display font-bold text-sm text-[#1F1A38]">⚠️ Erreur</div>
            <div className="font-body text-xs text-[#1F1A38] mt-1 break-words">{error}</div>
          </div>
        )}
        {success && (
          <div className="mt-3 p-3 rounded-2xl border-[3px] border-[#1F1A38] bg-[#2D5F45] anim-pop">
            <div className="font-display font-bold text-sm text-[#1F1A38]">✓ {success}</div>
          </div>
        )}

        {/* Current user questions count */}
        {userQ.length > 0 && (
          <div className="mt-5">
            <div className="bg-[#1F1A38] border-[3px] border-[#1F1A38] rounded-2xl p-3 lumio-shadow-sm">
              <div className="font-display font-bold text-sm text-white mb-1">
                {userQ.length} question{userQ.length > 1 ? 's' : ''} perso active{userQ.length > 1 ? 's' : ''}
              </div>
              <div className="font-body text-xs text-white opacity-70">
                Elles font partie de la rotation quotidienne et de tes stats.
              </div>
            </div>
            <button
              onClick={deleteAll}
              className={`w-full border-[3px] border-[#1F1A38] rounded-2xl py-3 lumio-shadow-sm lumio-press font-display font-bold text-sm mt-2 ${confirmDelete ? 'bg-[#6B2A1F] text-[#1F1A38] anim-pulse-soft' : 'bg-white text-[#1F1A38]'}`}
            >
              {confirmDelete ? 'Confirmer la suppression ?' : 'Tout supprimer'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}


/* =========================================================================
   PRACTICE MODES SCREEN – sprint, marathon, weak points, mix

  const { playSound } = useUI();
  const dayNumber = getDayNumber(state);
  const todayTheme = themeOfDay(dayNumber, state);

  const weakCount = Object.keys(state.errorCount || {}).filter(
    (id) => (state.errorCount[id] || 0) > 0 && (state.mastery[id] || 0) < 3
  ).length;

  const modes = [
    { id: 'sprint',   name: 'Sprint',          desc: '5 questions express', icon: Zap,      color: '#FFD23F', textColor: '#1F1A38' },
    { id: 'marathon', name: 'Marathon',        desc: '20 questions de fond',icon: Flame,    color: '#FF6B5B', textColor: 'white' },
    { id: 'weak',     name: 'Mes points faibles', desc: weakCount > 0 ? `${weakCount} questions à reprendre` : 'Aucune erreur (encore !)', icon: Target, color: '#0D7377', textColor: 'white' },
    { id: 'mix',      name: 'Mix aléatoire',   desc: 'Tous les thèmes mélangés', icon: Shuffle, color: '#7209B7', textColor: 'white' },
  ];

  return (
    <div className="flex flex-col h-full anim-slide">
      <div className="flex items-center gap-3 px-4 pt-4 pb-2">
        <button onClick={() => { playSound('click'); onBack(); }} className="bg-white border-[3px] border-[#1F1A38] rounded-xl p-2 lumio-shadow-sm lumio-press">
          <ArrowLeft size={18} className="text-[#1F1A38]" strokeWidth={2.5} />
        </button>
        <h1 className="font-display font-extrabold text-2xl text-[#1F1A38]">Modes de pratique</h1>
      </div>

      <div className="flex-1 overflow-y-auto px-4 pb-6">
        <div className="bg-white border-[3px] border-[#1F1A38] rounded-2xl p-3 lumio-shadow-sm mb-4">
          <div className="font-body text-sm text-[#1F1A38] leading-snug">
            Ces sessions <b>n'affectent ni ta série ni ton thème du jour</b>. Pratique libre, juste pour le plaisir et apprendre plus.
          </div>
        </div>

        <div className="space-y-3">
          {modes.map((m) => {
            const Icon = m.icon;
            const disabled = m.id === 'weak' && weakCount === 0;
            return (
              <button
                key={m.id}
                onClick={() => { if (!disabled) { playSound('select'); onLaunch(m.id, todayTheme.id); } else { playSound('wrong'); } }}
                style={{ backgroundColor: disabled ? '#2A2240' : m.color, color: disabled ? '#9893A6' : m.textColor }}
                className={`w-full text-left border-[3px] border-[#1F1A38] rounded-2xl p-4 lumio-shadow lumio-press-lg flex items-center gap-3 ${disabled ? 'opacity-50' : ''}`}
              >
                <div
                  className="w-12 h-12 rounded-xl border-[3px] border-[#1F1A38] flex items-center justify-center flex-shrink-0"
                  style={{ backgroundColor: 'white' }}
                >
                  <Icon size={24} className="text-[#1F1A38]" strokeWidth={2.5} />
                </div>
                <div className="flex-1 min-w-0">
                  <div className="font-display font-extrabold text-xl leading-tight">{m.name}</div>
                  <div className="font-body text-sm opacity-80 leading-tight">{m.desc}</div>
                </div>
                <ChevronRight size={20} strokeWidth={2.5} className="flex-shrink-0 opacity-70" />
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* =========================================================================
   BACKUP SCREEN – export / import full progress as JSON
   ========================================================================= */
function BackupScreen({ state, setState, onBack }) {
  const { playSound } = useUI();
  const [importText, setImportText] = useState('');
  const [error, setError] = useState(null);
  const [success, setSuccess] = useState(null);
  const [confirmRestore, setConfirmRestore] = useState(false);

  // Build a portable export object (skip transient fields)
  const exportObject = () => {
    const { streakFreezeJustUsed, ...exportable } = state;
    return JSON.stringify({ __lumio: 1, exportedAt: new Date().toISOString(), data: exportable }, null, 2);
  };

  const copyExport = async () => {
    setError(null); setSuccess(null);
    const json = exportObject();
    try {
      await navigator.clipboard.writeText(json);
      setSuccess('Sauvegarde copiée dans le presse-papier !');
      playSound('complete');
    } catch (_) {
      setError('Copie impossible — sélectionne et copie le texte ci-dessous manuellement.');
      playSound('wrong');
    }
  };

  const doImport = () => {
    setError(null); setSuccess(null);
    if (!importText.trim()) { setError('Colle d\'abord ta sauvegarde.'); return; }
    let parsed;
    try {
      parsed = JSON.parse(importText.trim());
    } catch (_) {
      setError('JSON invalide.'); playSound('wrong'); return;
    }
    if (!parsed || parsed.__lumio !== 1 || !parsed.data) {
      setError('Ce n\'est pas une sauvegarde Lumio valide.');
      playSound('wrong');
      return;
    }
    if (!confirmRestore) {
      setConfirmRestore(true);
      setError('⚠️ Restaurer écrasera ta progression actuelle. Reclique pour confirmer.');
      setTimeout(() => setConfirmRestore(false), 5000);
      return;
    }
    // Restore
    setState({ ...defaultState(), ...parsed.data });
    setSuccess('Sauvegarde restaurée !');
    setImportText('');
    setConfirmRestore(false);
    playSound('complete');
  };

  return (
    <div className="flex flex-col h-full anim-slide">
      <div className="flex items-center gap-3 px-4 pt-4 pb-2">
        <button onClick={() => { playSound('click'); onBack(); }} className="bg-white border-[3px] border-[#1F1A38] rounded-xl p-2 lumio-shadow-sm lumio-press">
          <ArrowLeft size={18} className="text-[#1F1A38]" strokeWidth={2.5} />
        </button>
        <h1 className="font-display font-extrabold text-2xl text-[#1F1A38]">Sauvegarde</h1>
      </div>

      <div className="flex-1 overflow-y-auto px-4 pb-6">
        {/* Export */}
        <h3 className="font-display font-extrabold text-sm uppercase tracking-wider text-[#1F1A38] opacity-60 mb-2 flex items-center gap-1">
          <Download size={14} /> Sauvegarder
        </h3>
        <div className="bg-white border-[3px] border-[#1F1A38] rounded-2xl p-3 lumio-shadow-sm mb-3">
          <div className="font-body text-sm text-[#1F1A38] leading-snug">
            Copie l'intégralité de ta progression (XP, streak, maîtrise, badges, questions perso…) sous forme de texte JSON. Garde-le quelque part au chaud.
          </div>
        </div>
        <button
          onClick={copyExport}
          className="w-full bg-[#FFD23F] border-[3px] border-[#1F1A38] rounded-2xl py-3 lumio-shadow lumio-press-lg font-display font-extrabold text-[#1F1A38] flex items-center justify-center gap-2 mb-2"
        >
          <Download size={18} strokeWidth={2.5} />
          Copier ma sauvegarde
        </button>
        <textarea
          readOnly
          value={exportObject()}
          rows={5}
          className="w-full px-3 py-3 rounded-2xl border-[3px] border-[#1F1A38] bg-white font-mono text-[10px] text-[#1F1A38] lumio-shadow-sm resize-y mb-5"
          onClick={(e) => e.target.select()}
        />

        {/* Import */}
        <h3 className="font-display font-extrabold text-sm uppercase tracking-wider text-[#1F1A38] opacity-60 mb-2 flex items-center gap-1">
          <Upload size={14} /> Restaurer
        </h3>
        <div className="bg-white border-[3px] border-[#1F1A38] rounded-2xl p-3 lumio-shadow-sm mb-3">
          <div className="font-body text-sm text-[#1F1A38] leading-snug">
            Colle une sauvegarde précédente pour la restaurer. <b>Attention</b> : ça écrase ta progression actuelle.
          </div>
        </div>
        <textarea
          value={importText}
          onChange={(e) => { setImportText(e.target.value); setError(null); setSuccess(null); }}
          placeholder="Colle ta sauvegarde JSON ici..."
          rows={6}
          className="w-full px-3 py-3 rounded-2xl border-[3px] border-[#1F1A38] bg-white font-mono text-[10px] text-[#1F1A38] lumio-shadow-sm resize-y mb-3"
        />
        <BigButton onClick={doImport} disabled={!importText.trim()} color={confirmRestore ? '#FF6B5B' : '#0D7377'}>
          {confirmRestore ? 'Confirmer la restauration' : 'Restaurer'}
        </BigButton>

        {error && (
          <div className="mt-3 p-3 rounded-2xl border-[3px] border-[#1F1A38] bg-[#6B2A1F] anim-shake">
            <div className="font-body text-sm text-[#1F1A38] break-words">{error}</div>
          </div>
        )}
        {success && (
          <div className="mt-3 p-3 rounded-2xl border-[3px] border-[#1F1A38] bg-[#2D5F45] anim-pop">
            <div className="font-display font-bold text-sm text-[#1F1A38]">✓ {success}</div>
          </div>
        )}
      </div>
    </div>
  );
}


function App() {
  const [state, setState] = useState(defaultState());
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState({ name: 'home' });

  useEffect(() => {
    (async () => {
      const s = await loadState();
      setState(s);
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (loaded) saveState(state);
  }, [state, loaded]);

  const setSoundEnabled = (v) => setState((s) => ({ ...s, soundEnabled: v }));
  const saveMoreInfo = useCallback((qid, text) => {
    setState((s) => ({
      ...s,
      moreInfoCache: { ...(s.moreInfoCache || {}), [qid]: text },
    }));
  }, []);

  // Stable playSound: reads soundEnabled fresh each call
  const soundEnabledRef = useRef(state.soundEnabled);
  useEffect(() => { soundEnabledRef.current = state.soundEnabled; }, [state.soundEnabled]);
  const playSound = useCallback((name) => {
    if (!soundEnabledRef.current) return;
    const fn = SOUND_LIBRARY[name];
    if (fn) fn();
  }, []);

  const ui = useMemo(() => ({
    darkMode: true,
    setDarkMode: () => {},
    soundEnabled: state.soundEnabled,
    setSoundEnabled,
    playSound,
    moreInfoCache: state.moreInfoCache || {},
    saveMoreInfo,
  }), [state.soundEnabled, state.moreInfoCache, playSound, saveMoreInfo]);

  const onStart = (themeId, mode = 'daily') => setView({ name: 'session', themeId, mode });

  const onComplete = (results, total, mode) => {
    const prev = { ...state };
    let newState = { ...state, xp: state.xp + results.xpGained };

    // Track daily XP
    const today = todayStr();
    newState.dailyXp = { ...(newState.dailyXp || {}) };
    newState.dailyXp[today] = (newState.dailyXp[today] || 0) + results.xpGained;

    // Perfect session tracking (10/10 only — every question correct on first try)
    const baseQuestions = results.originalSize || total;
    if ((results.freshCorrect || 0) >= baseQuestions) {
      newState.perfectSessions = (newState.perfectSessions || 0) + 1;
    }

    // Late-night session tracking
    const hour = new Date().getHours();
    if (hour >= 23 || hour < 5) {
      newState.lateNightSessions = (newState.lateNightSessions || 0) + 1;
    }

    // Streak / day rotation only for daily sessions
    const isDaily = !mode || mode === 'daily';
    if (isDaily) newState = applyDailySession(newState);

    // Check for newly unlocked badges
    const newBadgeIds = computeNewBadges(prev, newState);
    if (newBadgeIds.length > 0) {
      newState.unlockedBadges = [...(newState.unlockedBadges || []), ...newBadgeIds];
    }

    setState(newState);
    setView({
      name: 'end',
      themeId: view.themeId,
      mode,
      results,
      total,
      prevState: prev,
      newState,
      newBadges: newBadgeIds,
    });
  };

  if (!loaded) {
    return (
      <div className="w-full min-h-screen bg-[#FFF6E9] flex flex-col items-center justify-center lumio-dark gap-5">
        <LumioIcon size={140} className="anim-pop" />
        <div className="font-display font-bold text-2xl text-[#1F1A38] anim-pulse-soft">Lumio.</div>
      </div>
    );
  }

  return (
    <UIContext.Provider value={ui}>
      <div className="w-full min-h-screen bg-[#FFF6E9] font-body lumio-dark">
        <FontInjector />
        <div className="max-w-md mx-auto min-h-screen flex flex-col" style={{ minHeight: '100vh' }}>
          {view.name === 'home' && (
            <>
              <HeaderBar state={state} onOpenStats={() => setView({ name: 'stats' })} />
              <HomeScreen
                state={state}
                onStart={(themeId) => onStart(themeId, 'daily')}
                onOpenPrefs={() => setView({ name: 'prefs' })}
                onOpenPractice={() => setView({ name: 'practice' })}
              />
            </>
          )}
          {view.name === 'session' && (
            <SessionScreen
              themeId={view.themeId}
              mode={view.mode}
              state={state}
              setState={setState}
              onBack={() => setView({ name: 'home' })}
              onComplete={onComplete}
            />
          )}
          {view.name === 'end' && (
            <EndScreen
              results={view.results}
              total={view.total}
              themeId={view.themeId}
              mode={view.mode}
              prevState={view.prevState}
              newState={view.newState}
              newBadges={view.newBadges}
              onHome={() => setView({ name: 'home' })}
            />
          )}
          {view.name === 'stats' && (
            <StatsScreen state={state} onBack={() => setView({ name: 'home' })} />
          )}
          {view.name === 'prefs' && (
            <PreferencesScreen
              state={state}
              setState={setState}
              onBack={() => setView({ name: 'home' })}
              onOpenImport={() => setView({ name: 'import' })}
              onOpenBackup={() => setView({ name: 'backup' })}
            />
          )}
          {view.name === 'import' && (
            <ImportScreen
              state={state}
              setState={setState}
              onBack={() => setView({ name: 'prefs' })}
            />
          )}
          {view.name === 'backup' && (
            <BackupScreen
              state={state}
              setState={setState}
              onBack={() => setView({ name: 'prefs' })}
            />
          )}
          {view.name === 'practice' && (
            <PracticeModeScreen
              state={state}
              onBack={() => setView({ name: 'home' })}
              onLaunch={(mode, themeId) => onStart(themeId, mode)}
            />
          )}
        </div>
      </div>
    </UIContext.Provider>
  );
}

  // Mount
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
}
window.setupApp = setupApp;
if (window.LucideReact) setupApp();

  </script>
